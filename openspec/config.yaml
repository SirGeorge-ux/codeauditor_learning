    | Backend  | Formatter         | ✅        | `go fmt ./...`                         |
    | Frontend | Linter            | ❌        | No ESLint config found                 |
    | Frontend | Type checker      | ✅        | TypeScript 5.9 (via `ng build` / `tsc`) |
    | Frontend | Formatter         | ✅        | Prettier 3.8.1                         |

