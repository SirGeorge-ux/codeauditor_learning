schema: spec-driven

context: |
  Tech stack: Frontend Angular 21, Backend Go (Golang)
  Architecture: Hexagonal Architecture (dual — Go backend + Angular frontend, each with domain/application/infrastructure layers). Frontend hexagonal uses pure TS for domain/application, Angular for infrastructure. Backend hexagonal uses pure Go for domain/application, framework adapters for infrastructure.
  Testing: To be initialized (Angular CLI/Karma/Jest + go test)
  Style: Standard Go + Angular style guides

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  capabilities: |
    ## Testing Capabilities

    **Strict TDD Mode**: disabled (explicit in config)
    **Detected**: 2026-06-14 (init)

    ### Test Runners

    | Stack    | Command          | Framework | Config                                  |
    | -------- | ---------------- | --------- | --------------------------------------- |
    | Backend  | `go test ./...`  | Go stdlib | Go 1.23, standard `*testing.T`          |
    | Frontend | `ng test`        | Vitest    | Angular 21 `@angular/build:unit-test`, vitest 4.0.8, jsdom 28, tsconfig.spec.json with vitest/globals |

    ### Test Coverage

    | Stack    | Available | Command                      |
    | -------- | --------- | ---------------------------- |
    | Backend  | ✅        | `go test -coverprofile=coverage.out ./...` |
    | Frontend | ✅        | `ng test --code-coverage` (via Vitest)    |

